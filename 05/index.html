        h1+h2 {
            color: red
        }

        h3~h4 {
            color: green;
        }

        /* 가상 요소 선택자 */
        p::before {
            content: '<b>';
            color: red;
        }

        p::after {
            content: '<a>';
        }

        p:hover {
            color: aqua;
        }

        p:active {
            color: blue;
        }

        a:link {
            color: orange;
        }

        a:visited {
            color: green;
        }

        input:focus {
            color: red;
        }

        input:checked {
            color: orange;
        }

        input:disabled {
            color: yellow;
        }

        input:enabled {
            color: green;
        }

        /* li:first-child {
            color: red;
        } */

        li:last-child {
            color: purple;
        }

        li:nth-child(2) {
            color: orange;
        }

        li:nth-last-child(2) {
            color: blue;
        }

        p:nth-of-type(2) {
            color: chartreuse;
        }

        p:nth-last-of-type(2) {
            color: cornflowerblue;
        }

        li:first-of-type {
            color: coral;
        }

        li:last-of-type {
            font-weight: bold;
        }
    </style>
</head>
