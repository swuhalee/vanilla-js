<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p {
            color: red;
        }

        #title,
        .box {
            color: yellow;
        }

        section>div {
            background-color: aqua;
        }

        label+input {
            color: red;
        }

        a[href="https://www.naver.com"]>span {
            color: greenyellow;
        }
    </style>
</head>

<body>
    <p>1</p>
    <p>2</p>
    <p>3</p>

    <p id="title">4</p>

    <div class="box">
        <h1>5</h1>
    </div>

    <section>
        <div>
            <p>11</p>
        </div>
        <div>
            <p>22</p>
        </div>
    </section>

    <label>
        텍스트 입력
        <input type="text" placeholder="12">
    </label>
    <input type="text" placeholder="12">

    <a href="https://www.naver.com">
        <span>bbb</span>
    </a>
</body>

</html>
